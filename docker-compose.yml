version: '3.8'

services:
  gym_scraper:
    build:
      context: ./injestion
      dockerfile: Dockerfile
    volumes:
      - ./data/raw:/app/data/raw
      - ~/.aws:/root/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-gator-gauge}
      GATOR_GAUGE_S3_BUCKET: ${GATOR_GAUGE_S3_BUCKET:-gator-gains-data}
      GATOR_GAUGE_S3_PREFIX: ${GATOR_GAUGE_S3_PREFIX:-bronze/gym_counts}
    restart: "no"
